# Nginx 生产环境 HTTPS 与 WebSocket 代理配置模板

# 1. HTTP 自动重定向到 HTTPS
server {
    listen 80;
    server_name yourdomain.com; # 替换成您的真实备案域名
    
    # 强制将所有 HTTP 请求重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# 2. HTTPS 安全反向代理
server {
    listen 443 ssl;
    server_name yourdomain.com; # 替换成您的真实备案域名

    # SSL 证书配置 (微信小程序强制要求 HTTPS 且使用 TLS1.2 或以上版本)
    ssl_certificate /etc/nginx/certs/yourdomain.com.crt;     # 您的证书公钥路径
    ssl_certificate_key /etc/nginx/certs/yourdomain.com.key; # 您的证书私钥路径
    
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 客户端请求体最大限制 (情侣App主要是文本交互，设置极小限制以防 DDOS 占用内存)
    client_max_body_size 5m;

    # 反向代理到 Node.js 服务端的 3000 端口
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 核心配置：转发 Upgrade 与 Connection 请求头以支持 WebSocket 协议
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 转发客户端真实 IP 信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 调高读取超时时间 (1小时)，防止 WebSocket 长连接因空闲被 Nginx 强制切断
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
