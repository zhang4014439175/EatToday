<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EatToday H5 Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">EatToday Preview</p>
          <h1 id="appHeaderTitle">我们的日常</h1>
        </div>
        <div class="header-actions">
          <button id="headerRecipeBtn" class="btn ghost header-recipe-btn" data-action="go-to-recipe-book">📖 美食库</button>
          <button id="resetBtn" class="icon-btn" title="重置预览数据">↻</button>
        </div>
      </header>

      <section id="view" class="view"></section>

      <nav class="tabbar" aria-label="主导航">
        <button class="tab active" data-view="home">今日</button>
        <button class="tab" data-view="food">吃什么</button>
        <button class="tab" data-view="date">去哪玩</button>
        <button class="tab" data-view="profile">我的</button>
      </nav>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
