name: Deploy Backend to Alibaba Cloud

on:
  push:
    branches:
      - dev-space  # 当本地 push 代码到 dev-space 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. 进入云服务器上的项目代码目录（根据您在阿里云上的实际路径进行调整）
            # 下面会尝试几个常见默认目录，如不正确请在本地修改此行
            cd /home/project/EatToday
            
            # 2. 强制拉取最新代码
            git pull origin dev-space
            
            # 3. 进入后端安装依赖
            cd backend
            npm install --production
            
            # 4. 使用 PM2 重启服务（若未启动则新建启动）
            pm2 restart eat-today-backend || pm2 start server.js --name "eat-today-backend"
